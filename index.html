<script>
  // Script ini diletakkan di atas agar pengalihan terjadi secara instan sebelum halaman selesai dimuat
  (function() {
    // Mendeteksi apakah User-Agent mengandung kata kunci perangkat mobile
    var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    
    if (isMobile) {
      // Jika pengguna membuka lewat HP, otomatis dialihkan ke halaman Karyawan
      window.location.href = "./SISTEM_ABSENSI/KARYAWAN/KARYAWAN.html";
    } else {
      // Jika pengguna membuka lewat PC/Desktop, otomatis dialihkan ke halaman Admin
      window.location.href = "./SISTEM_ABSENSI/ADMIN/ADMIN.html";
    }
  })();
</script>
